<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base -->
  <rect x="12" y="86" width="60" height="10" rx="3" fill="#DCDCDC" stroke="#111" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Body -->
  <rect x="15" y="34" width="54" height="54" rx="3" fill="#FFC14D" stroke="#111" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Handle outer -->
  <path d="M69 43 Q90 43 90 60 Q90 77 69 77" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Handle inner fill -->
  <path d="M69 52 Q81 52 81 60 Q81 68 69 68" fill="#DCDCDC" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <!-- Foam bubbles -->
  <circle cx="24" cy="32" r="8.5" fill="#DCDCDC" stroke="#111" stroke-width="3.5"/>
  <circle cx="37" cy="27" r="10" fill="#DCDCDC" stroke="#111" stroke-width="3.5"/>
  <circle cx="51" cy="29" r="9.5" fill="#DCDCDC" stroke="#111" stroke-width="3.5"/>
  <circle cx="63" cy="32" r="8" fill="#DCDCDC" stroke="#111" stroke-width="3.5"/>
  <!-- Foam fill bottom (covers body-foam seam) -->
  <rect x="16" y="33" width="52" height="14" fill="#DCDCDC"/>
  <!-- Foam bottom border -->
  <line x1="15" y1="46" x2="69" y2="46" stroke="#111" stroke-width="3.5"/>
  <!-- Vertical grooves -->
  <line x1="34" y1="50" x2="34" y2="84" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="50" x2="45" y2="84" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="50" x2="56" y2="84" stroke="#111" stroke-width="3" stroke-linecap="round"/>
</svg>
